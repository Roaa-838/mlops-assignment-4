name: ML Model CI

# TASK: Modify trigger for all branches EXCEPT main
on:
  push:
    branches-ignore:
      - main

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      # BUG FIX 2: Checkout the code so requirements.txt exists!
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        # BUG FIX 3 (Part 1): Added flake8 to the installation
        run: |
          pip install -r requirements.txt
          pip install flake8

      - name: Linter Check
        # BUG FIX 3 (Part 2): Actually run the linter. (The --exit-zero flag prevents it from failing your build if your code is a little messy)
        run: flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Model Dry Test
        run: |
          python -c "import torch; print('Model environment ready!')"

      # TASK: Upload README.md as an artifact named "project-doc"
      - name: Upload Project Documentation
        uses: actions/upload-artifact@v4
        with:
          name: project-doc
          path: README.md